<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Server Error | FlowBoard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: { sans: ['Outfit', 'sans-serif'] },
                    colors: {
                        oled: '#000000',
                        supabase: { bg: '#171717', card: '#1e1e1e', border: '#2e2e2e', primary: '#3ecf8e', text: '#ededed', muted: '#a1a1a1' }
                    }
                }
            }
        }
        if (localStorage.getItem('theme') === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark');
        } else {
            document.documentElement.classList.remove('dark');
        }
    </script>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='4' fill='%233b82f6'/><text x='16' y='22' font-size='18' font-weight='bold' text-anchor='middle' fill='white'>F</text></svg>">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;700;800&display=swap" rel="stylesheet">
</head>
<body class="bg-zinc-50 dark:bg-supabase-bg text-zinc-900 dark:text-supabase-text min-h-screen flex items-center justify-center p-8">
    <div class="text-center max-w-md">
        <div class="text-8xl font-black text-zinc-200 dark:text-zinc-800 mb-4">500</div>
        <h1 class="text-2xl font-bold text-zinc-900 dark:text-white mb-2">Server Error</h1>
        <p class="text-sm text-zinc-500 dark:text-supabase-muted mb-8">Something went wrong on our end. Please try again.</p>
        <a href="{{ url_for('main.index') }}" class="inline-flex items-center gap-2 bg-blue-600 hover:bg-blue-500 text-white px-6 py-3 rounded-none font-bold text-sm transition shadow-lg">
            <i data-lucide="arrow-left" class="w-4 h-4"></i> Back to Dashboard
        </a>
    </div>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script>lucide.createIcons();</script>
</body>
</html>
